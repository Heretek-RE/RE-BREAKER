[Config]
; RE-extracted from DenuvOwO/bin64/DenuvOwO.ini
; Per SOW-O: in-lab protocol analysis in scope; production interaction prohibited.
;
; The per-target patch table format. For each new target:
;   - Set Targets=<game>.exe
;   - Update [LoadDlls] to point to the per-game id_dll
;   - Update [Patches:<game>.exe] with the per-target patch RVA + bytes
;   - Update [Hashes] with the binary's SHA-256 prefix (for tamper detection)

Targets=CrimsonDesert.exe

; Automatically load/unload the hypervisor
AutoLoadHV=true

; Show a message box prompting to revert the security feature changes
GoRevertMsg=true

; Enable this if a game has Capcom Anti-Tamper
Capcom=false

[LoadDlls]
; The coldloader is loaded by the DenuvOwO coldclient/GameOverlayRenderer64.dll wrapper.
; The cd_id.dll is loaded by coldloader.dll (which sets DR3 + issues CPUID handshake).
0=coldclient\coldloader.dll
1=cd_id.dll

[Sections]
; Define the sections for each target where the Denuvo code resides in
; Set this to "auto" to automatically choose the largest executable section
CrimsonDesert.exe=auto

[Patches:CrimsonDesert.exe]
; Add custom patches here (e.g. Steam ID patch)
; Format: <rva_as_hex>=<patch_as_hex_string>
; 123EC71B = 48 BB BA 56 00 00 01 00 10 01 90
; This is a `mov rbx, 0x190110000000056ba` instruction — a Steam ID rewriter
123EC71B=48BBBA5600000100100190

[Hashes]
; SHA-256 prefix of the original CD binary — the hypervisor uses this to
; verify the binary hasn't been tampered with before applying the patch
CrimsonDesert.exe=7126be19957462f7
