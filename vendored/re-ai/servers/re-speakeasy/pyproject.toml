[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "re-speakeasy"
version = "0.1.0"
description = "MCP server for Speakeasy (Mandiant) Windows API emulation — runs Windows .exe in a Wine-like emulator and returns a structured per-API trace. Vendor-neutral."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
keywords = ["mcp", "speakeasy", "mandiant", "windows-emulation", "anti-debug", "binary-analysis", "reverse-engineering"]
authors = [{name = "John"}]
dependencies = [
    "mcp[cli]>=1.2",
    "pydantic>=2.6",
]

[project.scripts]
re-speakeasy = "re_speakeasy.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"
