[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "re-anti-analysis"
version = "0.1.0"
description = "MCP server for anti-analysis primitive scanning: cross-section correlation of anti-debug + anti-VM + anti-sandbox primitives in a binary. Wraps re-lief + re-rizin + the vendored data/anti-analysis-catalog.json. Pure-Python, vendor-neutral."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
keywords = ['mcp', 'anti-debug', 'anti-vm', 'anti-sandbox', 'catalog', 'binary-analysis', 'reverse-engineering']
authors = [{name = "John"}]
dependencies = ['mcp[cli]>=1.2', 'pydantic>=2.6', 'pyyaml>=6.0']

[project.scripts]
re-anti-analysis = "re_anti_analysis.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"
